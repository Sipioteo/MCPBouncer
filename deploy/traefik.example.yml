global:
  checkNewVersion: false
  sendAnonymousUsage: false

# MCPBouncer Traefik plugin configuration
experimental:
  plugins:
    mcpbouncer:
      moduleName: github.com/Sipioteo/traefik-mcpbouncer
      version: v0.0.1

entryPoints:
  web:
    address: ':80'
  websecure:
    address: ':443'

# Docker provider for service discovery via labels
providers:
  docker:
    endpoint: unix:///var/run/docker.sock
    exposedByDefault: false
    swarmMode: false

api:
  dashboard: true
  insecure: true
